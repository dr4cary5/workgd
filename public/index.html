<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowX Gateway</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .status-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 3rem;
            max-width: 500px;
        }
        h1 {
            color: #8a2be2;
            font-size: 2.5rem;
            margin: 0 0 1rem;
            letter-spacing: 2px;
        }
        p {
            color: #888;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            background: #1a1a1a;
            color: #6e00ff;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            margin-top: 1rem;
            font-size: 0.9rem;
            border: 1px solid #6e00ff;
        }
    </style>
</head>
<body>
    <div class="status-card">
        <h1>🕶️ ShadowX</h1>
        <p>Gateway is active and running on Vercel Edge Network.</p>
        <span class="badge">shadowx.work.gd</span>
    </div>
</body>
</html>
